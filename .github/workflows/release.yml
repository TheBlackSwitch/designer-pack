name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "1.21.6-1.21.7" branch
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v4

      #Install dependencies
      - name: Install dependencies
        run: pip install -r .github/workflows/requirements_upload_version.txt
        
      #Make executable
      - name: Make executable
        run: chmod +x .github/workflows/scripts/upload_version.py

      # Run the main script that handles the automatic upload to modrinth and curseforge
      - name: Run the main script
        id: parse

        env:
            MODRINTHPAT: ${{ secrets.MODRINTHPAT }}
            CURSEFORGETOKEN: ${{ secrets.CURSEFORGETOKEN }}
            CURSEFORGEPAT: ${{ secrets.CURSEFORGEPAT }}
            BODY: ${{ github.event.release.body }}
            TAG: ${{ github.event.release.tag_name }}

        run: python3 .github/workflows/scripts/upload_version.py
